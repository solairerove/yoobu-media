services:

  # ── MinIO (S3-compatible local storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: yoobu-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console → http://localhost:9001
    volumes:
      - yoobu-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO init: create bucket and make it publicly readable ─────────────────
  minio-init:
    image: minio/mc:latest
    container_name: yoobu-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/yoobu-media;
        mc anonymous set public local/yoobu-media;
        exit 0;
      "

  yoobu-media:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yoobu-media
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      INTERNAL_API_KEY: dev-internal-key-change-in-prod
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY: minioadmin
      R2_SECRET_KEY: minioadmin
      R2_BUCKET: yoobu-media
      R2_REGION: auto
      # CDN_BASE_URL for local dev — MinIO public URL
      # In production: https://media.yoobu.app
      CDN_BASE_URL: http://localhost:9000/yoobu-media
      RUST_LOG: yoobu_media=debug,tower_http=debug
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  yoobu-minio-data:
